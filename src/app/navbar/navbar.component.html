<nav class="navbar">
    <span class="brand-text">Plate Forward</span>
  <ul class="nav-links">
    <li>
      <a href="#" (click)="goToDonation($event)">
        Food Donation
      </a>
    </li>
    <li>
      <a routerLink="/received-food" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Received Food
      </a>
    </li>
    <li>
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>
    </li>
    @if (!isLoggedInFlag) {
    <li>
      <a routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Login
      </a>
    </li>
    }
    @if (isLoggedInFlag) {
    <li class="profile-container">
      <img src="/defaultProfile.png" alt="Profile" class="profile-photo" (click)="toggleDropdown()">
      @if (isDropdownOpen) {
      <div class="dropdown-menu">
        <a (click)="goToProfile()">Profile</a>
        <a (click)="logout()">Logout</a>
      </div>
      }
    </li>
    }
    
  </ul>
</nav>
