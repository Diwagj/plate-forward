<div class="login-container">
  <div class="login-card">
    <h2>🛡️ Secure Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          [class.error]="email?.invalid && email?.touched"
          placeholder="Enter your email">
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          {{ email?.errors?.['required'] ? 'Email is required' : 'Please enter valid email' }}
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          [class.error]="password?.invalid && password?.touched"
          placeholder="Enter your password">
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          {{ password?.errors?.['required'] ? 'Password is required' : 'Password must be at least 6 characters' }}
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="login-btn">
        <span *ngIf="loginForm.valid">🚀 Login</span>
        <span *ngIf="loginForm.invalid">⚠️ Invalid Form</span>
      </button>
    </form>

    <div class="register-link">
      <p>Don't have an account? <button type="button" (click)="navigateToRegister()" class="register-btn">Create Account</button></p>
    </div>
  </div>
</div>
